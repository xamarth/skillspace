# Skillspace Workflow Update Skillcard And Root Route

## Action

Follow the update-skillcard-and-root-route workflow:
1. Edit src/components/skillcard.tsx to update the skill card UI or logic
2. Edit src/routes/__root.tsx and/or src/routes/index.tsx to reflect changes in the main route or homepage

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/components/skillcard.tsx, src/routes/__root.tsx, src/routes/index.tsx

